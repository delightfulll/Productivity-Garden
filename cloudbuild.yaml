# Google Cloud Build: build and push backend image to Artifact Registry.
#
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_BACKEND_IMAGE=REGION-docker.pkg.dev/PROJECT_ID/REPO/pg-backend
#
substitutions:
  _BACKEND_IMAGE: us-central1-docker.pkg.dev/PROJECT_ID/REPO/pg-backend

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_BACKEND_IMAGE}
      - backend

images:
  - ${_BACKEND_IMAGE}
